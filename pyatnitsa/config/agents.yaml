# Конфигурация суб-агентов Пятница.ai
# Агенты создаются через веб-панель или добавляются сюда вручную.
# Router (главный агент) делегирует задачи подходящему специалисту.
# Если agents пуст — система работает в legacy-режиме (один агент, все скиллы).
#
# Пример:
#
# agents:
#   my_agent:
#     name: "Название"
#     description: "Когда использовать этого агента"
#     skills:
#       - redmine
#       - mail
#     system_prompt: |
#       Инструкции для агента...
#     max_iterations: 8
#     temperature: 0.5
#     is_fallback: false
#     enabled: true

agents: {}
